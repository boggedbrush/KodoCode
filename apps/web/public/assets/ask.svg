  <!-- Ask -->
  <text x="44" y="34"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="18"
        font-weight="700"
        fill="#000">
    Ask
  </text>

  <!-- Plan -->
  <text x="120" y="34"
        text-anchor="middle"
