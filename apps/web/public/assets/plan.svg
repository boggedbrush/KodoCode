<svg xmlns="http://www.w3.org/2000/svg" width="240" height="56" viewBox="0 0 240 56">
  <!-- selected pill -->
  <rect x="80" y="4" width="80" height="48" rx="24" fill="#c8954a"/>

  <!-- Ask -->
  <text x="40" y="34"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="18"
        font-weight="600"
        fill="#5c6bc0">
    Ask
  </text>

  <!-- Plan -->
  <text x="120" y="34"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="18"
        font-weight="700"
        fill="#000">
    Plan
  </text>

  <!-- Act -->
  <text x="200" y="34"
        text-anchor="middle"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif"
        font-size="18"
        font-weight="600"
        fill="#2e7d32">
    Act
  </text>
</svg>